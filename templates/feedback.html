<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Feedback</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/static/css/style.css">
	<style>
		/* Custom dark navbar */
		.navbar-custom {
			background-color: #29345f !important;
		}

		/* Feedback section: clear background */
		.feedback-section {
			background: none;
		}
	</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Robotics Championship 2026</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
        <li class="nav-item"><a class="nav-link" href="/teams">Team List</a></li>
        <li class="nav-item"><a class="nav-link" href="/gallery">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="/feedback">Feedback</a></li>
        <li class="nav-item"><a class="nav-link" href="/results">Results</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin/login">Admin</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Feedback Section -->
<section class="feedback-section py-5">
	<div class="text-center mb-5">
		<h1 class="display-4">Feedback</h1>
		<hr class="w-25 mx-auto">
	</div>

	<div class="container my-5">
		<div class="row">
			<div class="col-xxl-8 col-md-8 col-10 mx-auto">
				<form method="post" action="/feedback">
					<div class="mb-3">
						<label class="form-label">Student ID</label>
						<input type="text" class="form-control" name="student_id" required>
					</div>
					<div class="mb-3">
						<label class="form-label">Email</label>
						<input type="email" class="form-control" name="email" required>
					</div>
					<div class="mb-3">
						<label class="form-label">Rating★★★★★</label>
						<select class="form-select" name="rating" required>
							<option value="">Select Rating</option>
							<option value="1">1 - Poor</option>
							<option value="2">2 - Fair</option>
							<option value="3">3 - Good</option>
							<option value="4">4 - Very Good</option>
							<option value="5">5 - Excellent</option>
						</select>
					</div>
					<div class="mb-3">
						<label class="form-label">Comments</label>
						<textarea class="form-control" name="comments" rows="4" required></textarea>
					</div>
					<button type="submit" class="btn btn-outline-info">Submit Feedback</button>
				</form>
			</div>
		</div>
	</div>
</section>

<!-- Footer -->
<footer class="bg-secondary text-center text-white py-3">
	<p>&copy; 2026 Robotics Championship | Designed by Janasi Rajput</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
